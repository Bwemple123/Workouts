<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossFit WOD Library</title>
<style>
:root{--bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--card:#1a1a1a;--card-h:#212121;--border:#2a2a2a;--border2:#333;--text:#e8e8e8;--text2:#888;--text3:#555;--orange:#ff5722;--orange2:#e64a19;--gold:#ffb300}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}

/* ── HEADER ── */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;position:sticky;top:0;z-index:100}
.header-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:12px}
h1{font-size:22px;font-weight:700;color:var(--orange);letter-spacing:-.5px}
.header-sub{font-size:12px;color:var(--text2);margin-top:2px}
.hbtns{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
.btn-p{background:var(--orange);color:#fff;border:none;border-radius:6px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-p:hover{background:var(--orange2)}
.btn-s{background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:6px;padding:8px 14px;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-s:hover{color:var(--text);border-color:var(--text2)}
.controls{display:flex;flex-wrap:wrap;gap:8px}
.controls input,.controls select{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:13px;padding:7px 11px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.controls input{flex:1;min-width:180px}
.controls select{min-width:130px;cursor:pointer}
.controls input:focus,.controls select:focus{border-color:var(--orange)}
.controls input::placeholder{color:var(--text3)}

/* ── TODAY'S WOD BANNER ── */
.today-wod{background:linear-gradient(135deg,#1a0a00,#2a1200);border:1px solid #5a2800;border-radius:10px;margin:16px 24px;padding:16px 20px;position:relative;overflow:hidden}
.today-wod::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--orange),var(--gold))}
.today-label{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.today-dot{width:7px;height:7px;background:var(--orange);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.today-date{font-size:11px;color:var(--text2);margin-left:auto}
.today-title{font-size:18px;font-weight:700;color:var(--orange);margin-bottom:6px}
.today-desc{font-size:13px;color:var(--text2);white-space:pre-line;line-height:1.7}
.today-meta{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.today-tag{font-size:11px;color:var(--text3);background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:20px;padding:2px 10px}
.today-src{font-size:11px;color:var(--text3);margin-top:6px}
.today-loading{color:var(--text3);font-size:13px;font-style:italic}
.today-error{color:#ff6b6b;font-size:13px}

/* ── STATS ── */
.stats{display:flex;gap:10px;padding:0 24px 14px;flex-wrap:wrap}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 14px;min-width:76px;text-align:center;flex-shrink:0}
.stat-n{font-size:20px;font-weight:700;color:var(--orange)}
.stat-l{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-top:1px}

/* ── MAIN ── */
main{padding:0 24px 60px;max-width:1400px;margin:0 auto}
.section-header{display:flex;align-items:center;gap:10px;margin:24px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.section-header:first-child{margin-top:0}
.section-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em}
.section-count{font-size:11px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:1px 8px}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:border-color .15s,background .15s}
.card:hover{background:var(--card-h);border-color:var(--border2)}
.card.done{opacity:.45}
.card.done .card-name::after{content:' ✓';color:#7ac97a;font-size:12px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-name{font-size:15px;font-weight:600;color:var(--text);line-height:1.3}
.badges{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;border:1px solid transparent}
.b-girls{background:#2c1515;color:#ff7070;border-color:#5c2020}
.b-hero{background:#0d1e2c;color:#5ab4f5;border-color:#1a4060}
.b-open{background:#1a0d2c;color:#b07fff;border-color:#3a1f60}
.b-jb{background:#1c1300;color:#ffb300;border-color:#4a3200}
.b-noah{background:#0d1f0d;color:#7ac97a;border-color:#1f4a1f}
.b-amrap{background:#0d2218;color:#4dd4a0}
.b-fortime{background:#2c1212;color:#ff6b6b}
.b-emom{background:#1c1400;color:#ffcc44}
.b-strength{background:#141428;color:#8888ff}
.b-other{background:#1c1c1c;color:#888}
.card-desc{font-size:12px;color:var(--text2);line-height:1.6;white-space:pre-line;max-height:0;overflow:hidden;transition:max-height .3s ease}
.card-desc.open{max-height:600px;margin-bottom:10px}
.card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);gap:4px;flex-wrap:wrap}
.meta-rx{color:var(--gold);font-weight:600}
.card-actions{display:flex;gap:6px;margin-top:8px}
.btn-sm{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-weight:500}
.btn-sm:hover{color:var(--text);border-color:var(--text2)}
.btn-done:hover{color:#7ac97a;border-color:#1f4a1f}
.btn-done.active{background:#0d1f0d;color:#7ac97a;border-color:#1f4a1f}
.note-preview{font-size:11px;color:var(--gold);margin-top:4px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{text-align:center;padding:60px 20px;color:var(--text2);font-size:15px}
.empty-icon{font-size:40px;margin-bottom:12px}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:24px;max-width:560px;width:100%;position:relative;max-height:85vh;overflow-y:auto}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer}
.modal-close:hover{color:var(--text)}
.modal-src{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.modal-name{font-size:22px;font-weight:700;color:var(--orange);margin-bottom:12px}
.modal-badges{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.modal-desc{font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-line;background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:14px}
.modal-row{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);gap:8px}
.modal-row:last-of-type{border-bottom:none}
.modal-key{color:var(--text2)}
.modal-val{color:var(--text);font-weight:600;text-align:right}
.modal-val.gold{color:var(--gold)}
.note-section{margin-top:16px}
.note-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.note-section textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:13px;padding:8px;min-height:70px;font-family:inherit;outline:none;resize:vertical}
.note-section textarea:focus{border-color:var(--gold)}
.note-section textarea::placeholder{color:var(--text3)}
.note-btns{display:flex;gap:8px;margin-top:6px}
.btn-note{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid #4a3200;background:#1c1300;color:#ffb300;cursor:pointer;font-weight:500}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media(max-width:600px){header,.stats,main{padding-left:14px;padding-right:14px}.today-wod{margin:12px 14px}.grid{grid-template-columns:1fr}h1{font-size:18px}}
</style>
</head>
<body>

<header>
  <div class="header-row1">
    <div>
      <h1>CrossFit WOD Library</h1>
      <div class="header-sub" id="subline">200+ workouts — loading...</div>
    </div>
    <div class="hbtns">
      <button class="btn-p" onclick="randomWOD()">🎲 Random WOD</button>
      <button class="btn-s" onclick="clearFilters()">Clear filters</button>
    </div>
  </div>
  <div class="controls">
    <input type="text" id="search" placeholder="Search workouts, movements, weights..." oninput="render()">
    <select id="src" onchange="render()">
      <option value="">All sources</option>
      <option value="girls">Benchmark Girls</option>
      <option value="hero">Hero WODs</option>
      <option value="open">CrossFit Open</option>
      <option value="jb">Josh Bridges</option>
      <option value="noah">Road to the Games</option>
    </select>
    <select id="yr" onchange="render()">
      <option value="">All years</option>
      <option value="2015">2015 Open</option>
      <option value="2016">2016 Open</option>
      <option value="2017">2017 Open</option>
      <option value="2018">2018 Open</option>
      <option value="2019">2019 Open</option>
      <option value="2020">2020 Open</option>
      <option value="2021">2021 Open</option>
      <option value="2022">2022 Open</option>
      <option value="2023">2023 Open</option>
      <option value="2024">2024 Open</option>
      <option value="2025">2025 Open</option>
    </select>
    <select id="type" onchange="render()">
      <option value="">All types</option>
      <option value="AMRAP">AMRAP</option>
      <option value="For Time">For Time</option>
      <option value="EMOM">EMOM</option>
      <option value="For Load">For Load</option>
      <option value="For Score">For Score</option>
      <option value="Conditioning">Conditioning</option>
      <option value="Strength">Strength</option>
    </select>
    <select id="timef" onchange="render()">
      <option value="">Any duration</option>
      <option value="short">Short (&lt;10 min)</option>
      <option value="medium">Medium (10–20 min)</option>
      <option value="long">Long (20+ min)</option>
    </select>
    <select id="donef" onchange="render()">
      <option value="">All workouts</option>
      <option value="todo">Not done yet</option>
      <option value="done">Completed</option>
      <option value="noted">Has notes</option>
    </select>
  </div>
</header>

<!-- TODAY'S WOD BANNER -->
<div class="today-wod" id="today-wod-banner">
  <div class="today-label">
    <div class="today-dot"></div>
    WOD of the Day
    <span class="today-date" id="today-date"></span>
  </div>
  <div class="today-loading" id="today-loading">Loading today's WOD...</div>
  <div id="today-content" style="display:none">
    <div class="today-title" id="today-title"></div>
    <div class="today-desc" id="today-desc"></div>
    <div class="today-meta" id="today-meta"></div>
    <div class="today-src" id="today-src"></div>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-n" id="s-showing">0</div><div class="stat-l">Showing</div></div>
  <div class="stat"><div class="stat-n" id="s-done">0</div><div class="stat-l">Completed</div></div>
  <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">Total WODs</div></div>
  <div class="stat"><div class="stat-n" id="s-girls">0</div><div class="stat-l">Girls</div></div>
  <div class="stat"><div class="stat-n" id="s-hero">0</div><div class="stat-l">Hero</div></div>
  <div class="stat"><div class="stat-n" id="s-open">0</div><div class="stat-l">Open</div></div>
  <div class="stat"><div class="stat-n" id="s-jb">0</div><div class="stat-l">Josh Bridges</div></div>
</div>

<main id="main"></main>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div class="modal-src" id="m-src"></div>
    <div class="modal-name" id="m-name"></div>
    <div class="modal-badges" id="m-badges"></div>
    <div class="modal-desc" id="m-desc"></div>
    <div id="m-rows"></div>
    <div class="note-section">
      <div class="note-label">Your notes / PR log</div>
      <textarea id="m-note" placeholder="Log your time, weight, score, notes..."></textarea>
      <div class="note-btns">
        <button class="btn-note" id="m-done-btn" onclick="modalToggleDone()">Mark as done</button>
        <button class="btn-note" onclick="modalSaveNote()">Save note</button>
      </div>
    </div>
  </div>
</div>

// ═══════════════════════════════════════════════════════════════
// APP STATE & UTILITIES
// ═══════════════════════════════════════════════════════════════
const SRC_LABELS={girls:"Benchmark Girls",hero:"Hero WODs",open:"CrossFit Open",jb:"Josh Bridges",noah:"Road to the Games"};
const SRC_ORDER=["girls","hero","open","jb","noah"];
function load(k,d){try{return JSON.parse(localStorage.getItem(k)||'null')??d}catch(e){return d}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
let done=new Set(load('wod_done',[]));
let notes=load('wod_notes',{});
let openCards=new Set();
let curModal=null;

function timeBucket(t){
  if(/until|failure/i.test(t))return"long";
  const n=parseInt(t.replace(/[^0-9]/g,''))||0;
  return n<10?"short":n<=20?"medium":"long";
}
function typeBadge(t){
  if(t.includes('AMRAP'))return'b-amrap';
  if(t.includes('For Time')||t.includes('For Score'))return'b-fortime';
  if(t.includes('EMOM'))return'b-emom';
  if(t.includes('Strength'))return'b-strength';
  return'b-other';
}

// ═══════════════════════════════════════════════════════════════
// LOAD TODAY'S WOD from wod.json
// ═══════════════════════════════════════════════════════════════
async function loadTodayWOD(){
  const dateEl=document.getElementById('today-date');
  const loadEl=document.getElementById('today-loading');
  const contentEl=document.getElementById('today-content');

  try{
    // Add cache-busting so browser always gets fresh version
    const resp=await fetch('wod.json?t='+Date.now());
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const data=await resp.json();

    dateEl.textContent=data.day||data.date||'';
    document.getElementById('today-title').textContent=data.wod.title||'CrossFit WOD';
    document.getElementById('today-desc').textContent=data.wod.description||'';

    const meta=document.getElementById('today-meta');
    if(data.wod.type){
      meta.innerHTML=`<span class="today-tag">${data.wod.type}</span>`;
    }

    const srcEl=document.getElementById('today-src');
    const sourceMap={
      'crossfit.com':'Source: crossfit.com',
      'wodwell.com':'Source: wodwell.com',
      'rotation':'Classic WOD rotation (auto-scrape updates this daily)'
    };
    srcEl.textContent=sourceMap[data.wod.source]||('Source: '+data.wod.source);
    if(data.wod.url){
      srcEl.innerHTML=`<a href="${data.wod.url}" target="_blank" rel="noopener" style="color:var(--text3);text-decoration:none">${srcEl.textContent} ↗</a>`;
    }

    loadEl.style.display='none';
    contentEl.style.display='block';
  }catch(e){
    loadEl.style.display='none';
    contentEl.style.display='block';
    document.getElementById('today-title').textContent='WOD of the Day';
    document.getElementById('today-desc').textContent='Today\'s WOD will appear here once the site is deployed on GitHub Pages.';
    document.getElementById('today-src').textContent='Deploy to GitHub Pages to enable auto-daily updates';
    dateEl.textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  }
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const sf=document.getElementById('src').value;
  const yf=document.getElementById('yr').value;
  const tf=document.getElementById('type').value;
  const timef=document.getElementById('timef').value;
  const df=document.getElementById('donef').value;

  const filtered=WODS.filter(w=>{
    if(sf&&w.src!==sf)return false;
    if(yf&&w.yr!==yf)return false;
    if(tf&&!w.type.includes(tf))return false;
    if(timef&&timeBucket(w.time)!==timef)return false;
    if(df==='done'&&!done.has(w.id))return false;
    if(df==='todo'&&done.has(w.id))return false;
    if(df==='noted'&&!notes[w.id])return false;
    if(q){const hay=(w.name+' '+w.desc+' '+w.rx+' '+w.type+' '+w.src+' '+w.yr).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });

  document.getElementById('s-showing').textContent=filtered.length;
  document.getElementById('s-done').textContent=done.size;
  document.getElementById('s-total').textContent=WODS.length;
  document.getElementById('s-girls').textContent=WODS.filter(w=>w.src==='girls').length;
  document.getElementById('s-hero').textContent=WODS.filter(w=>w.src==='hero').length;
  document.getElementById('s-open').textContent=WODS.filter(w=>w.src==='open').length;
  document.getElementById('s-jb').textContent=WODS.filter(w=>w.src==='jb').length;
  document.getElementById('subline').textContent=`${WODS.length} workouts — Benchmark Girls · Hero WODs · CrossFit Open 2015–2025 · Josh Bridges · Noah Ohlsen`;

  const groups={};SRC_ORDER.forEach(s=>groups[s]=[]);
  filtered.forEach(w=>groups[w.src].push(w));

  let html='';
  SRC_ORDER.forEach(src=>{
    const wods=groups[src];if(!wods.length)return;
    html+=`<div class="section-header"><span class="section-title">${SRC_LABELS[src]}</span><span class="section-count">${wods.length}</span></div><div class="grid">`;
    wods.forEach(w=>{
      const isDone=done.has(w.id);const hasNote=!!notes[w.id];const isOpen=openCards.has(w.id);
      const yrTag=w.yr?`<span class="badge b-open">${w.yr}</span>`:'';
      html+=`<div class="card${isDone?' done':''}" onclick="openModal(${w.id})">
        <div class="card-top">
          <div class="card-name">${w.name}</div>
          <div class="badges"><span class="badge b-${w.src}">${SRC_LABELS[w.src].split(' ')[0]}</span>${yrTag}<span class="badge ${typeBadge(w.type)}">${w.type}</span></div>
        </div>
        <div class="card-desc${isOpen?' open':''}" id="d${w.id}">${w.desc.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>
        <div class="card-meta"><span>${w.time}</span><span class="meta-rx">${w.rx}</span><span>Score: ${w.score}</span></div>
        ${hasNote?`<div class="note-preview">${(notes[w.id]||'').substring(0,55)}${notes[w.id]&&notes[w.id].length>55?'…':''}</div>`:''}
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="btn-sm" onclick="toggleDesc(${w.id},this)">${isOpen?'Less':'More'}</button>
          <button class="btn-sm btn-done${isDone?' active':''}" onclick="toggleDone(${w.id})">${isDone?'Done ✓':'Mark done'}</button>
          <button class="btn-sm" onclick="openModal(${w.id})">${hasNote?'Edit note':'Add note'}</button>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  if(!html)html='<div class="empty"><div class="empty-icon">🔍</div>No workouts match.<br><span style="font-size:13px;color:var(--text3)">Try adjusting search or filters.</span></div>';
  document.getElementById('main').innerHTML=html;
}

function toggleDesc(id,btn){
  const el=document.getElementById('d'+id);
  const isOpen=el.classList.toggle('open');
  btn.textContent=isOpen?'Less':'More';
  if(isOpen)openCards.add(id);else openCards.delete(id);
}
function toggleDone(id){
  if(done.has(id))done.delete(id);else done.add(id);
  save('wod_done',[...done]);render();
}
function clearFilters(){
  ['search','src','yr','type','timef','donef'].forEach(id=>{
    const el=document.getElementById(id);
    el.value=id==='search'?'':el.options[0].value;
  });
  render();
}
function randomWOD(){clearFilters();const idx=Math.floor(Math.random()*WODS.length);openModal(WODS[idx].id);}

function openModal(id){
  const w=WODS.find(x=>x.id===id);if(!w)return;curModal=id;
  document.getElementById('m-src').textContent=SRC_LABELS[w.src]+(w.yr?' · '+w.yr+' Open':'');
  document.getElementById('m-name').textContent=w.name;
  document.getElementById('m-badges').innerHTML=`<span class="badge b-${w.src}">${SRC_LABELS[w.src]}</span>${w.yr?`<span class="badge b-open">${w.yr}</span>`:''}<span class="badge ${typeBadge(w.type)}">${w.type}</span>`;
  document.getElementById('m-desc').textContent=w.desc;
  document.getElementById('m-rows').innerHTML=`
    <div class="modal-row"><span class="modal-key">Duration</span><span class="modal-val">${w.time}</span></div>
    <div class="modal-row"><span class="modal-key">Rx weights</span><span class="modal-val gold">${w.rx}</span></div>
    <div class="modal-row"><span class="modal-key">Score</span><span class="modal-val">${w.score}</span></div>`;
  document.getElementById('m-note').value=notes[id]||'';
  document.getElementById('m-done-btn').textContent=done.has(id)?'Unmark done':'Mark as done';
  document.getElementById('modal').classList.add('open');
}
function closeModal(e){if(e.target===document.getElementById('modal'))closeModalBtn();}
function closeModalBtn(){document.getElementById('modal').classList.remove('open');curModal=null;}
function modalToggleDone(){
  if(!curModal)return;
  if(done.has(curModal))done.delete(curModal);else done.add(curModal);
  save('wod_done',[...done]);
  document.getElementById('m-done-btn').textContent=done.has(curModal)?'Unmark done':'Mark as done';
  render();
}
function modalSaveNote(){
  if(!curModal)return;
  const val=document.getElementById('m-note').value.trim();
  if(val)notes[curModal]=val;else delete notes[curModal];
  save('wod_notes',notes);render();
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalBtn();});

// ── INIT ──────────────────────────────────────────────────────
loadTodayWOD();
render();
</script>
