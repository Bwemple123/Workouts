<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOD Library — CrossFit Workout Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #181818;
  --surface3: #202020;
  --border: #222;
  --border2: #2e2e2e;
  --text: #f0f0f0;
  --text2: #999;
  --text3: #555;
  --orange: #ff4500;
  --orange-dim: #cc3600;
  --gold: #f5a623;
  --accent: #ff4500;

  /* source colors */
  --c-girls: #e05555; --c-hero: #4a9eff; --c-open: #9d6fff;
  --c-jb: #f5a623; --c-mayhem: #ff6b35; --c-hwpo: #00bfff;
  --c-heppner: #b366ff; --c-fikowski: #00e5a0; --c-tia: #ff80ab;
  --c-khalipa: #ffcc44; --c-filly: #00d4cc; --c-annie: #ff6666;
  --c-bensmith: #66ff88; --c-kari: #cc44ff; --c-brooke: #4488ff;
  --c-games: #ffd700; --c-emom: #aaaaff; --c-noah: #88cc88;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── HEADER ─────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,.5);
}
.header-main {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px 10px;
  gap: 16px;
}
.logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px;
  font-weight: 900;
  color: var(--orange);
  letter-spacing: 2px;
  text-transform: uppercase;
  line-height: 1;
  white-space: nowrap;
}
.logo span { color: var(--text2); font-weight: 400; font-size: 13px; display: block; letter-spacing: 4px; margin-top: 1px; }
.header-actions { display: flex; gap: 8px; flex-shrink: 0; }
.btn-random {
  background: var(--orange);
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 9px 18px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .15s, transform .1s;
}
.btn-random:hover { background: var(--orange-dim); transform: translateY(-1px); }
.btn-clear {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 9px 14px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .15s;
}
.btn-clear:hover { color: var(--text); border-color: var(--text2); }

/* ── SEARCH BAR ─────────────────────────────── */
.search-row {
  padding: 0 24px 12px;
  display: flex;
  gap: 8px;
}
.search-wrap {
  flex: 1;
  position: relative;
}
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 16px;
  pointer-events: none;
}
#search {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 15px;
  padding: 9px 12px 9px 38px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
#search:focus {
  border-color: var(--orange);
  box-shadow: 0 0 0 2px rgba(255,69,0,.15);
}
#search::placeholder { color: var(--text3); }

/* ── FILTER PILLS ───────────────────────────── */
.filters-scroll {
  overflow-x: auto;
  padding: 0 24px 14px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.filters-scroll::-webkit-scrollbar { display: none; }
.filter-row {
  display: flex;
  gap: 6px;
  white-space: nowrap;
  min-width: max-content;
}
.filter-group {
  display: flex;
  gap: 4px;
  align-items: center;
}
.filter-group-label {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .1em;
  font-weight: 600;
  padding: 0 4px;
  white-space: nowrap;
}
.filter-divider {
  width: 1px;
  height: 20px;
  background: var(--border2);
  margin: 0 4px;
  flex-shrink: 0;
}
.pill {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  color: var(--text2);
  font-family: 'Barlow', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 4px 12px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  user-select: none;
}
.pill:hover { border-color: var(--text2); color: var(--text); }
.pill.active {
  background: var(--orange);
  border-color: var(--orange);
  color: #fff;
  font-weight: 600;
}
.pill.src-pill.active { border-color: transparent; }

/* source-colored pills when active */
.pill[data-src="girls"].active { background: var(--c-girls); }
.pill[data-src="hero"].active { background: var(--c-hero); }
.pill[data-src="open"].active { background: var(--c-open); }
.pill[data-src="jb"].active { background: var(--c-jb); color: #000; }
.pill[data-src="mayhem"].active { background: var(--c-mayhem); }
.pill[data-src="hwpo"].active { background: var(--c-hwpo); color: #000; }
.pill[data-src="heppner"].active { background: var(--c-heppner); }
.pill[data-src="fikowski"].active { background: var(--c-fikowski); color: #000; }
.pill[data-src="tia"].active { background: var(--c-tia); color: #000; }
.pill[data-src="khalipa"].active { background: var(--c-khalipa); color: #000; }
.pill[data-src="filly"].active { background: var(--c-filly); color: #000; }
.pill[data-src="annie"].active { background: var(--c-annie); }
.pill[data-src="bensmith"].active { background: var(--c-bensmith); color: #000; }
.pill[data-src="kari"].active { background: var(--c-kari); }
.pill[data-src="brooke"].active { background: var(--c-brooke); }
.pill[data-src="games"].active { background: var(--c-games); color: #000; }
.pill[data-src="emom"].active { background: var(--c-emom); color: #000; }
.pill[data-src="noah"].active { background: var(--c-noah); color: #000; }

/* ── TODAY'S WOD ────────────────────────────── */
.today-banner {
  margin: 0 24px 0;
  background: linear-gradient(135deg, #150800, #1f0d00);
  border: 1px solid #3a1a00;
  border-radius: 8px;
  padding: 14px 18px;
  position: relative;
  overflow: hidden;
}
.today-banner::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--orange), var(--gold), var(--orange));
}
.today-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.today-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--orange);
  animation: pulse 2s infinite;
  flex-shrink: 0;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.today-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--gold);
}
.today-date { margin-left: auto; font-size: 11px; color: var(--text3); }
.today-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--orange);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.today-desc {
  font-size: 13px;
  color: var(--text2);
  white-space: pre-line;
  line-height: 1.6;
}
.today-footer { margin-top: 8px; font-size: 11px; color: var(--text3); }
.today-footer a { color: var(--text3); text-decoration: none; }
.today-footer a:hover { color: var(--text2); }
.today-placeholder { color: var(--text3); font-size: 13px; font-style: italic; }

/* ── STATS BAR ──────────────────────────────── */
.stats-bar {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 12px 24px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  font-size: 12px;
  color: var(--text2);
  overflow-x: auto;
  scrollbar-width: none;
}
.stats-bar::-webkit-scrollbar { display: none; }
.stat-item { white-space: nowrap; flex-shrink: 0; }
.stat-item strong { color: var(--orange); font-size: 16px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; margin-right: 4px; }
.stat-sep { color: var(--border2); }

/* ── MAIN LAYOUT ────────────────────────────── */
.layout {
  display: flex;
  gap: 0;
  min-height: calc(100vh - 200px);
}

/* ── SIDEBAR ────────────────────────────────── */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  padding: 20px 0;
  position: sticky;
  top: 200px;
  height: calc(100vh - 200px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.sidebar-section { margin-bottom: 20px; }
.sidebar-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 0 16px 8px;
  display: block;
}
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  cursor: pointer;
  transition: background .1s;
  font-size: 13px;
  color: var(--text2);
  border-left: 2px solid transparent;
}
.sidebar-item:hover { background: var(--surface2); color: var(--text); }
.sidebar-item.active {
  background: var(--surface2);
  color: var(--text);
  border-left-color: var(--orange);
}
.sidebar-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sidebar-count {
  margin-left: auto;
  font-size: 11px;
  color: var(--text3);
  background: var(--surface3);
  border-radius: 10px;
  padding: 1px 6px;
  flex-shrink: 0;
}

/* ── CONTENT ────────────────────────────────── */
.content { flex: 1; padding: 20px 24px 60px; min-width: 0; }

/* ── SECTION HEADERS ────────────────────────── */
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 32px 0 14px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
}
.section-header:first-child { margin-top: 0; }
.section-color-bar {
  width: 4px;
  height: 24px;
  border-radius: 2px;
  flex-shrink: 0;
}
.section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text);
}
.section-count {
  font-size: 12px;
  color: var(--text3);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 10px;
  margin-left: auto;
}

/* ── WORKOUT CARDS ──────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s, transform .1s;
  position: relative;
}
.card:hover {
  border-color: var(--border2);
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
  transform: translateY(-1px);
}
.card.done { opacity: .4; }
.card.highlighted { border-color: var(--orange) !important; box-shadow: 0 0 0 1px var(--orange); }

/* color bar on left */
.card-accent {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}

.card-body { padding: 14px 14px 10px 17px; }

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.card-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: .5px;
}
.card-name.done-name::after { content: ' ✓'; color: #66bb6a; font-size: 14px; }
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; flex-shrink: 0; }
.tag {
  font-size: 10px;
  font-weight: 600;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: .5px;
  padding: 2px 8px;
  border-radius: 3px;
  white-space: nowrap;
  text-transform: uppercase;
}

/* type tags */
.tag-amrap { background: #0d2218; color: #4dd4a0; }
.tag-fortime { background: #2c1212; color: #ff6b6b; }
.tag-emom { background: #1c1400; color: #ffcc44; }
.tag-strength { background: #141428; color: #8888ff; }
.tag-conditioning { background: #0d1a1a; color: #44cccc; }
.tag-tabata { background: #1a0d1a; color: #cc88ff; }
.tag-other { background: var(--surface3); color: var(--text2); }

/* ── WORKOUT DETAILS (expanded) ─────────────── */
.card-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.8;
  white-space: pre-line;
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease, margin .2s;
}
.card-desc.open {
  max-height: 500px;
  margin-bottom: 10px;
}

/* ── CARD META ROW ──────────────────────────── */
.card-meta {
  display: flex;
  align-items: center;
  gap: 0;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.meta-item {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-right: 1px solid var(--border);
  font-size: 11px;
  white-space: nowrap;
}
.meta-item:first-child { padding-left: 0; }
.meta-item:last-child { border-right: none; }
.meta-label { color: var(--text3); font-size: 10px; text-transform: uppercase; letter-spacing: .05em; }
.meta-value { color: var(--text); font-weight: 600; }
.meta-value.gold { color: var(--gold); }

/* ── CARD FOOTER ────────────────────────────── */
.card-footer {
  display: flex;
  align-items: center;
  padding: 6px 14px 8px 17px;
  gap: 6px;
  background: var(--surface2);
  border-top: 1px solid var(--border);
}
.note-preview-text {
  font-size: 11px;
  color: var(--gold);
  font-style: italic;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.btn-expand, .btn-done-sm, .btn-note-sm {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  letter-spacing: .5px;
  text-transform: uppercase;
  transition: all .15s;
  white-space: nowrap;
}
.btn-expand:hover { color: var(--text); border-color: var(--text2); }
.btn-done-sm:hover { color: #66bb6a; border-color: #66bb6a; background: rgba(102,187,106,.1); }
.btn-done-sm.active { color: #66bb6a; border-color: #66bb6a; background: rgba(102,187,106,.1); }
.btn-note-sm:hover { color: var(--gold); border-color: var(--gold); background: rgba(245,166,35,.1); }

/* ── EMPTY STATE ────────────────────────────── */
.empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--text2);
}
.empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.empty-sub { font-size: 14px; color: var(--text3); }

/* ── MODAL ──────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.88);
  z-index: 300;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  max-width: 600px;
  width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,.8);
}
.modal-top {
  padding: 20px 24px 0;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--text2);
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  cursor: pointer;
  transition: all .15s;
}
.modal-close:hover { color: var(--text); border-color: var(--text2); }
.modal-source {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}
.modal-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 30px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
  line-height: 1.1;
}
.modal-tags { display: flex; gap: 6px; flex-wrap: wrap; padding-bottom: 14px; }

.modal-body { padding: 20px 24px; }
.modal-desc {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.9;
  white-space: pre-line;
  background: var(--surface2);
  border-radius: 6px;
  padding: 16px;
  margin-bottom: 16px;
  border-left: 3px solid var(--orange);
}
.modal-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 20px;
}
.modal-stat {
  background: var(--surface2);
  padding: 12px 14px;
}
.modal-stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
.modal-stat-value { font-size: 14px; font-weight: 600; color: var(--text); }
.modal-stat-value.gold { color: var(--gold); }

.modal-notes-section { }
.modal-notes-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 8px;
}
.modal-notes-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  padding: 10px 12px;
  min-height: 80px;
  resize: vertical;
  outline: none;
  transition: border-color .15s;
}
.modal-notes-input:focus { border-color: var(--gold); }
.modal-notes-input::placeholder { color: var(--text3); }
.modal-btn-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.modal-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 8px 18px;
  border-radius: 4px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
}
.modal-btn:hover { color: var(--text); border-color: var(--text2); }
.modal-btn.primary { background: var(--orange); border-color: var(--orange); color: #fff; }
.modal-btn.primary:hover { background: var(--orange-dim); }
.modal-btn.done-btn.active { background: rgba(102,187,106,.15); border-color: #66bb6a; color: #66bb6a; }

/* ── SCROLLBAR ──────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── RESPONSIVE ─────────────────────────────── */
@media (max-width: 900px) {
  .sidebar { display: none; }
}
@media (max-width: 640px) {
  .header-main, .search-row, .filters-scroll, .content { padding-left: 14px; padding-right: 14px; }
  .today-banner { margin-left: 14px; margin-right: 14px; }
  .grid { grid-template-columns: 1fr; }
  .logo { font-size: 22px; }
  .modal-stats { grid-template-columns: 1fr 1fr; }
}

// TODAY'S WOD
// ═══════════════════════════════════════════
async function loadTodayWOD() {
  const dateEl = document.getElementById('today-date');
  const contentEl = document.getElementById('today-content');
  dateEl.textContent = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  try {
    const resp = await fetch('wod.json?t='+Date.now());
    if (!resp.ok) throw new Error();
    const data = await resp.json();
    dateEl.textContent = data.day || dateEl.textContent;
    contentEl.innerHTML = `
      <div class="today-title">${data.wod.title||'CrossFit WOD'}</div>
      <div class="today-desc">${(data.wod.description||'').replace(/</g,'&lt;')}</div>
      <div class="today-footer">Source: ${data.wod.source||'—'} ${data.wod.url?`· <a href="${data.wod.url}" target="_blank" rel="noopener">View ↗</a>`:''}</div>`;
  } catch(e) {
    contentEl.innerHTML = `<div class="today-desc" style="color:var(--text3)">Today's WOD auto-updates daily at 6 AM UTC via GitHub Actions. Deploy to GitHub Pages to enable.</div>`;
  }
}

  filterSrc = v;
  document.querySelectorAll('.src-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  // show/hide year filter
  document.getElementById('year-filter-stat').style.display = (v==='open'||v==='games') ? '' : 'none';

  render();
}

}
function clearAll() {
  filterSrc=''; filterType=''; filterDur=''; filterStatus='';
  document.getElementById('search').value='';
  document.getElementById('yr').value='';
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  document.querySelector('.src-pill[data-src=""]').classList.add('active');
  document.querySelector('[data-type=""]').classList.add('active');
  document.querySelector('[data-dur=""]').classList.add('active');
  document.querySelector('[data-status=""]').classList.add('active');
  document.getElementById('year-filter-stat').style.display='none';
  render();
}
function timeBucket(t){
  if(/until|failure/i.test(t))return'long';
  const n=parseInt(t.replace(/[^0-9]/g,''))||0;
  return n<10?'short':n<=20?'medium':'long';
}
function typeClass(t){
  if(t.includes('AMRAP'))return'tag-amrap';
  if(t.includes('For Time')||t.includes('For Score'))return'tag-fortime';
  if(t.includes('EMOM'))return'tag-emom';
  if(t.includes('Strength'))return'tag-strength';
  if(t.includes('Conditioning'))return'tag-conditioning';
  if(t.includes('Tabata'))return'tag-tabata';
  return'tag-other';
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const yf = document.getElementById('yr').value;

  const filtered = WODS.filter(w => {
    if(filterSrc && w.src !== filterSrc) return false;
    if(filterType && !w.type.includes(filterType)) return false;
    if(filterDur && timeBucket(w.time) !== filterDur) return false;
    if(filterStatus==='done' && !done.has(w.id)) return false;
    if(filterStatus==='todo' && done.has(w.id)) return false;
    if(filterStatus==='noted' && !notes[w.id]) return false;
    if(yf && w.yr !== yf) return false;
    if(q){
      const hay = (w.name+' '+w.desc+' '+w.rx+' '+w.type+' '+w.src+' '+w.yr).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('s-showing').textContent = filtered.length;
  document.getElementById('s-total').textContent = WODS.length;
  document.getElementById('s-done').textContent = done.size;

  // Group by source
  const groups = {};
  SRC_ORDER.forEach(s => groups[s] = []);
  filtered.forEach(w => groups[w.src] && groups[w.src].push(w));

  // Sidebar
  const sidebar = document.getElementById('sidebar');
  let sidebarHtml = '<div class="sidebar-section"><span class="sidebar-label">Jump to Section</span>';
  SRC_ORDER.forEach(src => {
    const wods = groups[src];
    if(!wods.length) return;
    const cfg = SRC_CONFIG[src];
    sidebarHtml += `<div class="sidebar-item" onclick="jumpTo('section-${src}')">
      <div class="sidebar-dot" style="background:${cfg.color}"></div>
      <span>${cfg.label.split(' (')[0]}</span>
      <span class="sidebar-count">${wods.length}</span>
    </div>`;
  });
  sidebarHtml += '</div>';
  sidebar.innerHTML = sidebarHtml;

  // Main content
  let html = '';
  SRC_ORDER.forEach(src => {
    const wods = groups[src];
    if(!wods.length) return;
    const cfg = SRC_CONFIG[src];
    html += `<div id="section-${src}">
      <div class="section-header">
        <div class="section-color-bar" style="background:${cfg.color}"></div>
        <div class="section-title">${cfg.label}</div>
        <div class="section-count">${wods.length} WODs</div>
      </div>
      <div class="grid">`;

    wods.forEach(w => {
      const isDone = done.has(w.id);
      const hasNote = !!notes[w.id];
      const isOpen = openCards.has(w.id);
      const color = cfg.color;
      const yrTag = w.yr ? `<span class="tag" style="background:rgba(157,111,255,.15);color:#9d6fff">${w.yr}</span>` : '';

      html += `<div class="card${isDone?' done':''}" onclick="openModal(${w.id})">
        <div class="card-accent" style="background:${color}"></div>
        <div class="card-body">
          <div class="card-top">
            <div class="card-name${isDone?' done-name':''}">${w.name}</div>
            <div class="card-tags">
              ${yrTag}
              <span class="tag ${typeClass(w.type)}">${w.type}</span>
            </div>
          </div>
          <div class="card-desc${isOpen?' open':''}" id="d${w.id}">${w.desc.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>
          <div class="card-meta">
            <div class="meta-item">
              <span class="meta-label">Time</span>&nbsp;
              <span class="meta-value">${w.time}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Rx</span>&nbsp;
              <span class="meta-value gold">${w.rx}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Score</span>&nbsp;
              <span class="meta-value">${w.score}</span>
            </div>
          </div>
        </div>
        <div class="card-footer" onclick="event.stopPropagation()">
          <button class="btn-expand" onclick="toggleDesc(${w.id},this)">${isOpen?'▲ Less':'▼ Show WOD'}</button>
          <button class="btn-done-sm${isDone?' active':''}" onclick="toggleDone(${w.id})">${isDone?'✓ Done':'Mark Done'}</button>
          <button class="btn-note-sm" onclick="openModal(${w.id})">${hasNote?'✏️ Note':'+ Note'}</button>
          ${hasNote?`<div class="note-preview-text">${(notes[w.id]||'').substring(0,40)}…</div>`:''}
        </div>
      </div>`;
    });
    html += '</div></div>';
  });

  if(!html) html = `<div class="empty">
    <div class="empty-icon">🔍</div>
    <div class="empty-title">No workouts found</div>
    <div class="empty-sub">Try adjusting your search or filters</div>
  </div>`;

  document.getElementById('main').innerHTML = html;
}

// ═══════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════
function toggleDesc(id, btn) {
  const el = document.getElementById('d'+id);
  const isOpen = el.classList.toggle('open');
  btn.textContent = isOpen ? '▲ Less' : '▼ Show WOD';
  if(isOpen) openCards.add(id); else openCards.delete(id);
}

function toggleDone(id) {
  if(done.has(id)) done.delete(id); else done.add(id);
  save('wod_done', [...done]);
  render();
}

function jumpTo(id) {
  const el = document.getElementById(id);
  if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

function randomWOD() {
  clearAll();
  const idx = Math.floor(Math.random() * WODS.length);
  openModal(WODS[idx].id);
}

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
function openModal(id) {
  const w = WODS.find(x => x.id === id);
  if(!w) return;
  curModal = id;
  const cfg = SRC_CONFIG[w.src] || {label:'Unknown',color:'#888'};
  document.getElementById('m-source').textContent = cfg.label + (w.yr ? ' · ' + w.yr : '');
  document.getElementById('m-name').textContent = w.name;
  document.getElementById('m-name').style.color = cfg.color;
  document.getElementById('m-tags').innerHTML = `
    <span class="tag ${typeClass(w.type)}">${w.type}</span>
    ${w.yr?`<span class="tag" style="background:rgba(157,111,255,.15);color:#9d6fff">${w.yr} Open</span>`:''}`;
  document.getElementById('m-desc').textContent = w.desc;
  document.getElementById('m-stats').innerHTML = `
    <div class="modal-stat"><div class="modal-stat-label">Duration</div><div class="modal-stat-value">${w.time}</div></div>
    <div class="modal-stat"><div class="modal-stat-label">Rx Weights</div><div class="modal-stat-value gold">${w.rx}</div></div>
    <div class="modal-stat"><div class="modal-stat-label">Score</div><div class="modal-stat-value">${w.score}</div></div>`;
  document.getElementById('m-note').value = notes[id] || '';
  const doneBtn = document.getElementById('m-done-btn');
  doneBtn.textContent = done.has(id) ? '✓ Unmark Done' : 'Mark Done';
  doneBtn.classList.toggle('active', done.has(id));
  document.getElementById('modal').classList.add('open');
}

function closeModalBg(e) { if(e.target===document.getElementById('modal')) closeModal(); }
function closeModal() { document.getElementById('modal').classList.remove('open'); curModal=null; }

function modalDone() {
  if(!curModal) return;
  if(done.has(curModal)) done.delete(curModal); else done.add(curModal);
  save('wod_done', [...done]);
  const btn = document.getElementById('m-done-btn');
  btn.textContent = done.has(curModal) ? '✓ Unmark Done' : 'Mark Done';
  btn.classList.toggle('active', done.has(curModal));
  render();
}

function modalSave() {
  if(!curModal) return;
  const val = document.getElementById('m-note').value.trim();
  if(val) notes[curModal] = val; else delete notes[curModal];
  save('wod_notes', notes);
  render();
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
loadTodayWOD();
render();
</script>
</body>
</html>
